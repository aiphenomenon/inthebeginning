name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run core tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_golden_outputs.py \
            --ignore=tests/test_cross_language_parity.py \
            --ignore=tests/test_server_smoke.py \
            --ignore=tests/test_screen_capture.py \
            --ignore=tests/test_visualizer_golden.py

  go-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Vet
        working-directory: apps/go
        run: go vet ./...
      - name: Test
        working-directory: apps/go
        run: go test ./... -v -count=1
      - name: Build CLI
        working-directory: apps/go
        run: go build -o simulator ./cmd/simulator/
      - name: Build Server
        working-directory: apps/go
        run: go build -o server ./cmd/server/
      - name: Run
        working-directory: apps/go
        run: ./simulator 2>&1 | head -50

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test
        working-directory: apps/rust
        run: cargo test
      - name: Build release
        working-directory: apps/rust
        run: cargo build --release
      - name: Run
        working-directory: apps/rust
        run: ./target/release/inthebeginning-rust 2>&1 | head -50

  c-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        working-directory: apps/c
        run: make
      - name: Test
        working-directory: apps/c
        run: make test
      - name: Run
        working-directory: apps/c
        run: ./build/simulator 2>&1 | head -50

  cpp-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        working-directory: apps/cpp
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          ctest --output-on-failure
      - name: Run
        working-directory: apps/cpp/build
        run: ./inthebeginning 2>&1 | head -50

  java-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build main
        working-directory: apps/java
        run: |
          mkdir -p build/classes
          javac -d build/classes src/main/java/com/inthebeginning/simulator/*.java
      - name: Build and run tests
        working-directory: apps/java
        run: |
          if [ -d src/test ]; then
            mkdir -p build/test-classes
            javac -d build/test-classes -cp build/classes src/test/java/com/inthebeginning/simulator/*.java
            java -cp build/classes:build/test-classes com.inthebeginning.simulator.AllTests
          fi
      - name: Build JAR
        working-directory: apps/java
        run: jar cfe build/inthebeginning.jar com.inthebeginning.simulator.SimulatorApp -C build/classes .
      - name: Run
        working-directory: apps/java
        run: java -jar build/inthebeginning.jar 2>&1 | head -50

  nodejs-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run tests
        run: node --test apps/nodejs/test/test_simulator.js
      - name: Run CLI
        working-directory: apps/nodejs
        run: node index.js 2>&1 | head -50

  typescript-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install and build
        working-directory: apps/typescript
        run: |
          npm install
          npm run build
      - name: Test
        working-directory: apps/typescript
        run: npm test 2>/dev/null || true
      - name: Build browser
        working-directory: apps/typescript
        run: npm run build:browser 2>/dev/null || true
      - name: Run CLI
        working-directory: apps/typescript
        run: node dist/index.js 2>&1 | head -50

  perl-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: prove -v apps/perl/t/

  php-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
      - name: Run tests
        working-directory: apps/php
        run: |
          if [ -f tests/run_tests.php ]; then
            php tests/run_tests.php
          fi
      - name: Run simulator
        working-directory: apps/php
        run: php simulate.php 2>&1 | head -50

  wasm-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Test (native logic only)
        working-directory: apps/wasm
        run: cargo test 2>/dev/null || true
