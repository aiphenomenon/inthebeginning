name: Golden Output Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  golden-outputs:
    runs-on: ubuntu-latest
    name: Golden Output & Parity Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install pytest
        run: pip install pytest

      - name: Install TypeScript dependencies
        working-directory: apps/typescript
        run: npm install

      - name: Run golden output tests
        run: python -m pytest tests/test_golden_outputs.py -v --tb=short
        timeout-minutes: 10

      - name: Run cross-language parity tests
        run: python -m pytest tests/test_cross_language_parity.py -v --tb=short
        timeout-minutes: 10

      - name: Run visualizer golden tests
        run: python -m pytest tests/test_visualizer_golden.py -v --tb=short
        timeout-minutes: 10

      - name: Run audio golden tests
        run: python -m pytest tests/test_audio_golden.py -v --tb=short
        timeout-minutes: 5

  server-smoke:
    runs-on: ubuntu-latest
    name: Server Smoke Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install pytest and PHP
        run: |
          pip install pytest
          sudo apt-get update -qq
          sudo apt-get install -y -qq php-cli

      - name: Run server smoke tests
        run: python -m pytest tests/test_server_smoke.py -v --tb=short
        timeout-minutes: 5

  snapshot-capture:
    runs-on: ubuntu-latest
    name: Capture Golden Snapshots
    needs: [golden-outputs]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js dependencies
        working-directory: apps/typescript
        run: npm install

      - name: Capture golden snapshots
        run: python tools/capture_golden.py

      - name: Upload golden snapshots
        uses: actions/upload-artifact@v4
        with:
          name: golden-snapshots
          path: tests/golden_snapshots/
          retention-days: 90
