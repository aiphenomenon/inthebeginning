name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-go:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build CLI
        working-directory: apps/go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o "inthebeginning-go-${GOOS}-${GOARCH}${EXT}" ./cmd/simulator/
      - name: Build SSE Server
        working-directory: apps/go
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags="-s -w" -o "inthebeginning-go-server-${GOOS}-${GOARCH}${EXT}" ./cmd/server/
      - uses: actions/upload-artifact@v4
        with:
          name: go-${{ matrix.goos }}-${{ matrix.goarch }}
          path: apps/go/inthebeginning-go-*

  build-rust:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-amd64
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-amd64-musl
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - name: Build
        working-directory: apps/rust
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        working-directory: apps/rust
        shell: bash
        run: |
          EXT=""
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then EXT=".exe"; fi
          cp "target/${{ matrix.target }}/release/inthebeginning-rust${EXT}" "inthebeginning-rust-${{ matrix.name }}${EXT}" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.name }}
          path: apps/rust/inthebeginning-rust-*

  build-c:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build static
        working-directory: apps/c
        run: make static
      - name: Package
        working-directory: apps/c
        run: cp build/simulator-static inthebeginning-c-linux-amd64 2>/dev/null || cp build/simulator inthebeginning-c-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: c-linux-amd64
          path: apps/c/inthebeginning-c-linux-amd64

  build-cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        working-directory: apps/cpp
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          cp inthebeginning ../inthebeginning-cpp-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: cpp-linux-amd64
          path: apps/cpp/inthebeginning-cpp-linux-amd64

  build-java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Build JAR
        working-directory: apps/java
        run: |
          mkdir -p build/classes
          javac -d build/classes src/main/java/com/inthebeginning/simulator/*.java
          jar cfe build/inthebeginning.jar com.inthebeginning.simulator.SimulatorApp -C build/classes .
      - uses: actions/upload-artifact@v4
        with:
          name: java-jar
          path: apps/java/build/inthebeginning.jar

  build-nodejs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Package
        working-directory: apps/nodejs
        run: |
          npm install --omit=dev 2>/dev/null || true
          cd ..
          tar czf nodejs/inthebeginning-nodejs.tar.gz nodejs/*.js nodejs/package.json
      - uses: actions/upload-artifact@v4
        with:
          name: nodejs
          path: apps/nodejs/inthebeginning-nodejs.tar.gz

  build-typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build
        working-directory: apps/typescript
        run: |
          npm install
          npm run build
          npm run build:browser 2>/dev/null || true
          cd ..
          tar czf typescript/inthebeginning-typescript.tar.gz typescript/dist/ typescript/dist-browser/ typescript/public/ typescript/package.json
      - uses: actions/upload-artifact@v4
        with:
          name: typescript
          path: apps/typescript/inthebeginning-typescript.tar.gz

  release:
    needs: [build-go, build-rust, build-c, build-cpp, build-java, build-nodejs, build-typescript]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
