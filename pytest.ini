[pytest]
testpaths = tests apps/audio
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Fast unit tests (<5s) — always run
    integration: Integration tests (~30s) — run when affected code changes
    e2e: Browser end-to-end tests (~2-5min) — run at cut or game code change
    screen: Screenshot comparison tests
    audio: Audio capture and analysis tests
    wasm: WASM-specific tests
    slow: Tests that take >30s

addopts = --tb=short
